name: Publish create-jilatax

on:
  push:
    tags:
      - "create-jilatax-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build jilatax
        working-directory: packages/jilatax
        run: bun run build

      - name: Build create-jilatax
        working-directory: packages/create-jilatax
        run: bun run build

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish create-jilatax with provenance
        working-directory: packages/create-jilatax
        run: npm publish --provenance --access public
